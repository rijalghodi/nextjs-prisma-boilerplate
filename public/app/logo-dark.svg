<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="200" height="200">

  <!-- Mask to cut the crescent -->
  <defs>
    <mask id="moonMask">
      <rect width="120" height="120" fill="white"/>
      <circle cx="75" cy="60" r="30" fill="black"/>
    </mask>
  </defs>

  <!-- Bigger Border -->
  <rect x="2" y="2" width="116" height="116" rx="12"
        fill="none" stroke="#76bf89" stroke-width="6"/>

  <!-- Crescent -->
  <circle cx="60" cy="60" r="40" fill="#76bf89" mask="url(#moonMask)"/>

  <!-- Star -->
  <polygon points="
    84,45
    88,55
    100,55
    90,61
    94,73
    84,67
    74,73
    78,61
    68,55
    80,55
  " fill="#76bf89"/>

</svg>